name: Mosaic Filter
description: Toggleable, movable, and resizable mosaic overlay for blurring or censoring any region of a scene. Supports rectangle and ellipse shapes, plus a reverse mode that blurs everything outside the filter area. Per-scene position and size are remembered.
version: 0.4.2
url: https://github.com/stashalizer/stashapp-plugins-vault
ui:
  requires:
    - CommunityScriptsUILibrary
  javascript:
    - MosaicFilter.js
    - MosaicFilterSettings.js
  css:
    - MosaicFilter.css
    - MosaicFilterSettings.css
